<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Apex Padlock CMS &mdash; Expert Author Control Deck</title>
  <meta name="description" content="Authorized contributor CMS studio. Supabase REST PostgreSQL sync.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>

  <link rel="stylesheet" href="../src/styles.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans antialiased selection:bg-emerald-500 selection:text-slate-950 transition duration-300">

  <header class="h-20 bg-slate-950 text-white border-b border-slate-800 sticky top-0 z-50 transition">
    <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
      
      <a href="../index.html" class="flex items-center gap-3 text-xl sm:text-2xl font-black text-white cursor-pointer group flex-shrink-0">
        <span class="w-9 h-9 rounded-2xl bg-emerald-500 text-slate-950 flex items-center justify-center text-base font-black shadow-lg shadow-emerald-500/30 animate-pulse">⚡</span>
        <span>Apex<span class="text-emerald-400">Padlock CMS</span></span>
      </a>
      
      <nav class="hidden lg:flex items-center gap-7 font-black text-xs text-slate-300">
        <a href="../index.html" class="hover:text-emerald-400 transition">&larr; Live Homepage</a>
        <button class="cms-tab-btn bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-4 py-2.5 rounded-xl font-black shadow-md transition cursor-pointer" data-tab="writer-studio">✍️ Writer Studio</button>
        <button class="cms-tab-btn hover:text-emerald-400 transition cursor-pointer" data-tab="kanban-calendar">📅 Kanban Calendar</button>
        <button class="cms-tab-btn hover:text-emerald-400 transition cursor-pointer" data-tab="analytics-dashboard">📊 Telemetry Lab</button>
        <button class="cms-tab-btn hover:text-emerald-400 transition cursor-pointer" data-tab="seo-tools">⚡ Cloud Database</button>
      </nav>
      
      <div class="flex items-center gap-3 flex-shrink-0">
        <button id="btn-cms-logout" class="btn bg-rose-950/80 hover:bg-rose-900 text-rose-300 hover:text-white px-3.5 py-2.5 rounded-xl font-black text-xs border border-rose-800 cursor-pointer transition shadow-sm" title="Terminate secure CMS session">
          🚪 Sign Out
        </button>
        <button id="btn-admin-mobile-menu" class="lg:hidden p-2 rounded-xl bg-slate-800 text-slate-200 border border-slate-700 cursor-pointer">
          ☰
        </button>
      </div>

    </div>

    <div id="admin-mobile-drawer" class="lg:hidden hidden bg-slate-950 border-b border-slate-800 p-6 shadow-2xl space-y-3 font-extrabold text-xs text-slate-200 animate-slideIn">
      <a href="../index.html" class="block py-2 text-indigo-400">&larr; Live Homepage</a>
      <button class="cms-tab-btn w-full py-2.5 bg-emerald-500 text-slate-950 font-black rounded-xl cursor-pointer text-center" data-tab="writer-studio">✍️ Writer Studio</button>
      <button class="cms-tab-btn w-full py-2 hover:text-emerald-400 cursor-pointer text-left" data-tab="kanban-calendar">📅 Kanban Calendar</button>
      <button class="cms-tab-btn w-full py-2 hover:text-emerald-400 cursor-pointer text-left" data-tab="analytics-dashboard">📊 Telemetry Lab</button>
      <button class="cms-tab-btn w-full py-2 hover:text-emerald-400 cursor-pointer text-left" data-tab="seo-tools">⚡ Cloud Database</button>
    </div>
  </header>

  <main class="flex-1 py-10 px-6 max-w-7xl mx-auto w-full">
    <div id="apex-toast-container" class="toast-container"></div>

    <section id="view-writer-studio" class="cms-view active space-y-8">
      <div id="writer-studio-container"></div>
    </section>

    <section id="view-kanban-calendar" class="cms-view hidden space-y-8">
      <div id="kanban-calendar-container"></div>
    </section>

    <section id="view-analytics-dashboard" class="cms-view hidden space-y-8">
      <div id="analytics-dashboard-container"></div>
    </section>

    <section id="view-seo-tools" class="cms-view hidden space-y-8">
      <div id="seo-tools-container"></div>
    </section>
  </main>

  <footer class="py-12 bg-slate-950 border-t border-slate-800 text-center text-xs font-bold text-slate-600 mt-auto">
    © 2026 Apex Padlock CMS. Enterprise PostgreSQL Edge Architecture.
  </footer>

  <script src="../src/icons.js"></script>
  <script src="../src/data.js"></script>
  <script src="../src/seo.js"></script>
  <script src="../src/supabaseClient.js"></script>
  <script src="../src/exporter.js"></script>
  <script src="../src/app.js"></script>

  <script>
    const enforceAdminSession = async () => {
      const isAuth = window.ApexSupabase ? window.ApexSupabase.isAuthenticated() : false;
      const sess = window.ApexSupabase ? window.ApexSupabase.getSession() : null;
      if (!isAuth && !sess) {
        window.location.href = "../login.html";
        return;
      }

      if (window.ApexPulseApp) {
        window.ApexPulseApp.isAdminMode = true;
        setTimeout(() => {
          window.ApexPulseApp.renderEditorView();
          window.ApexPulseApp.renderKanbanBoard();
          window.ApexPulseApp.renderAnalyticsDashboard();
          window.ApexPulseApp.renderSeoToolsSuite();
        }, 100);
      }
    };

    enforceAdminSession();

    document.querySelectorAll(".cms-tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const tab = btn.getAttribute("data-tab");
        document.querySelectorAll(".cms-view").forEach(v => v.classList.add("hidden"));
        document.getElementById(`view-${tab}`)?.classList.remove("hidden");
        document.getElementById("admin-mobile-drawer")?.classList.add("hidden");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    document.getElementById("btn-cms-logout")?.addEventListener("click", () => {
      if (window.ApexSupabase) window.ApexSupabase.signOut();
      window.location.href = "../login.html";
    });

    document.getElementById("btn-admin-mobile-menu")?.addEventListener("click", () => {
      document.getElementById("admin-mobile-drawer")?.classList.toggle("hidden");
    });
  </script>
</body>
</html>
