<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>CMS Padlock Gateway &mdash; Secure Staff Entry</title>
  <meta name="description" content="Authorized CMS contributor login gateway. Supabase REST GoTrue authentication.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>

  <link rel="stylesheet" href="./src/styles.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans antialiased selection:bg-indigo-500 selection:text-white justify-center items-center p-6">

  <div class="bg-slate-900 text-white rounded-3xl border border-slate-800 p-8 sm:p-14 shadow-2xl max-w-md w-full space-y-6 animate-slideIn">
    
    <div class="flex items-center justify-between border-b border-slate-800 pb-4">
      <a href="./index.html" class="flex items-center gap-3 text-xl font-black text-white cursor-pointer group flex-shrink-0">
        <span class="w-8 h-8 rounded-xl bg-indigo-600 text-white flex items-center justify-center text-xs font-black shadow-lg shadow-indigo-500/30 group-hover:scale-105 transition">⚡</span>
        <span>Apex<span class="text-indigo-400">Padlock</span></span>
      </a>
      <a href="./index.html" class="text-xs font-extrabold text-slate-500 hover:text-white transition">&larr; Public Blog</a>
    </div>

    <div>
      <h1 class="text-2xl font-black text-white tracking-tight">Staff Contributor Entry</h1>
      <p class="text-xs text-slate-400 leading-relaxed mt-1 font-medium">Authorized engineers only. Enter your GoTrue credentials to unlock your content studio and persistent telemetry logs.</p>
    </div>

    <form id="standalone-login-form" class="space-y-4.5 pt-2">
      <div>
        <label class="block text-xs font-black uppercase tracking-wider text-slate-300 mb-1.5">Authorized Email</label>
        <input id="em-in" type="email" placeholder="author@apexpulse.com" required value="akash@apexpulse.com" class="input pl-4 text-xs font-mono font-bold bg-slate-950 border border-slate-800 text-white py-3.5 rounded-xl focus:border-indigo-500 outline-none">
      </div>
      <div>
        <label class="block text-xs font-black uppercase tracking-wider text-slate-300 mb-1.5">Master Password</label>
        <input id="pw-in" type="password" placeholder="••••••••" required value="apex2026" class="input pl-4 text-xs font-mono font-bold bg-slate-950 border border-slate-800 text-white py-3.5 rounded-xl focus:border-indigo-500 outline-none">
      </div>
      
      <button type="submit" class="btn bg-indigo-600 hover:bg-indigo-500 text-white w-full py-4 rounded-2xl font-black text-xs shadow-lg shadow-indigo-600/30 transform hover:scale-105 transition cursor-pointer">
        ⚡ Verify & Unlock CMS &rarr;
      </button>
    </form>

    <div id="login-warn-box" class="hidden p-4 rounded-xl bg-rose-950/80 border border-rose-800 text-rose-300 text-xs font-bold text-center"></div>

    <div class="text-[11px] text-center font-bold text-slate-600 pt-3 border-t border-slate-800">
      Sandboxed active mode automatically accepts default retainers.
    </div>

  </div>

  <script src="./src/icons.js"></script>
  <script src="./src/data.js"></script>
  <script src="./src/seo.js"></script>
  <script src="./src/supabaseClient.js"></script>

  <script>
    document.getElementById("standalone-login-form")?.addEventListener("submit", async (e) => {
      e.preventDefault();
      const em = document.getElementById("em-in")?.value;
      const pw = document.getElementById("pw-in")?.value;
      const warn = document.getElementById("login-warn-box");
      if (warn) warn.classList.add("hidden");

      try {
        await window.ApexSupabase?.signIn(em, pw);
        window.location.href = "./admin.html";
      } catch(err) {
        if (warn) {
          warn.innerHTML = err.message || "Invalid credentials.";
          warn.classList.remove("hidden");
        }
      }
    });
  </script>
</body>
</html>
